  solicitar_troca:
    version: 1.0.0
    server: retail
    endpoint: /tools/call
    protocol: legacy_http
    enabled: true
    idempotent: false
    cache_ttl_seconds: 0
    timeout_seconds: 30
    retry: {enabled: false}
