    allowed_agents: []
    allowed_channels: []
    required_business_keys: []

  listar_servicos:
    version: 1.0.0
    server: telecom
    endpoint: /tools/call
    protocol: legacy_http
    enabled: true
    idempotent: true
    cache_ttl_seconds: 300
    timeout_seconds: 30
    retry: {enabled: true, max_attempts: 2, backoff_ms: 250}
    allowed_agents: []
    allowed_channels: []
    required_business_keys: []

  consultar_pedido:
    version: 1.0.0
    server: retail
    endpoint: /tools/call
    protocol: legacy_http
    enabled: true
    idempotent: true
    cache_ttl_seconds: 300
    timeout_seconds: 30
    retry: {enabled: true, max_attempts: 2, backoff_ms: 250}
    allowed_agents: []
    allowed_channels: []
    required_business_keys: []

  consultar_entrega:
    version: 1.0.0
    server: retail
