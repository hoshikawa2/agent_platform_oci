services:
  mcp_gateway:
    build:
      context: ../..
      dockerfile: apps/mcp_gateway/Dockerfile
    ports:
      - "8300:8300"
    depends_on:
      - mock_telecom_mcp

  mock_telecom_mcp:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app:app --host 0.0.0.0 --port 8001"
    volumes:
      - ../../mcp/servers/mock_telecom_mcp:/app
    ports:
      - "8001:8001"
