apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/part-of: agent-framework-oci
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
        app.kubernetes.io/part-of: agent-framework-oci
    spec:
      serviceAccountName: agent-framework-oci
      containers:
        - name: ai-gateway
          image: ai-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9100
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
spec:
  selector:
    app.kubernetes.io/name: ai-gateway
  ports:
    - name: http
      port: 9100
      targetPort: 9100
