apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  labels:
    app: mcp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      serviceAccountName: mcp-gateway-sa
      containers:
        - name: mcp-gateway
          image: registry.example.com/agent-platform/mcp-gateway:1.0.0
          ports:
            - containerPort: 8300
          env:
            - name: MCP_GATEWAY_CONFIG_PATH
              value: /app/config/mcp_gateway.yaml
          readinessProbe:
            httpGet:
              path: /ready
              port: 8300
          livenessProbe:
            httpGet:
              path: /health
              port: 8300
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
spec:
  selector:
    app: mcp-gateway
  ports:
    - port: 8300
      targetPort: 8300
